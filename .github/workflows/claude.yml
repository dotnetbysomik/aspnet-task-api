name: Claude Assistant

on:
  pull_request:
    types: [ opened, synchronize, ready_for_review, reopened ]
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  issues:
    types: [ opened, assigned, labeled ]
  pull_request_review:
    types: [ submitted ]
  #concurrency:
  #group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  #cancel-in-progress: true

jobs:
  claude-response:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.actor, '[bot]') && github.actor != 'Copilot' }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: dotnetbysomik/claude-code-action@main
        with:
          # Proxy configuration
          anthropic_base_url: ${{ secrets.PROXY_BASE_URL }}
          anthropic_auth_token: ${{ secrets.PROXY_AUTH_TOKEN }}

          # Enable progress tracking
          track_progress: true

          # Trigger configuration
          trigger_phrase: "@claude"

          # Branch management
          #base_branch: ${{ github.base_ref }}
          #branch_prefix: "claude/"

          # GitHub token
          github_token: ${{ steps.app-token.outputs.token }}
          # Optional: Additional settings
          # settings: ""
          # use_sticky_comment: "true"
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          # Your custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            
            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

# When track_progress is enabled:
# - Creates a tracking comment with progress checkboxes
# - Includes all PR context (comments, attachments, images)
# - Updates progress as the review proceeds
# - Marks as completed when done
